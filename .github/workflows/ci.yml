name: CI

on:
  push:
    branches: [main, master, "feature/**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install ruff
      - name: Check for errors
        run: python -m ruff check .

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: python -m pip install -r requirements_test.txt
      - name: Validate translation and manifest JSON
        run: |
          python -m json.tool custom_components/salus/manifest.json > /dev/null
          python -m json.tool custom_components/salus/strings.json > /dev/null
          python -m json.tool custom_components/salus/translations/en.json > /dev/null
          python -m json.tool custom_components/salus/translations/ca.json > /dev/null
      - name: Run tests
        run: python -m pytest tests/ -v --cov=custom_components/salus --cov-report=term-missing
      - name: Compile Python files
        run: python -m compileall -q custom_components tests

  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
