name: Support / Bug
description: Report a Salus iT600 Home Assistant integration problem or bug.
title: "[Support/Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for setup, polling, entity, diagnostics, migration, and command issues in Home Assistant.

        If you are asking for a new device, new entity, or new behavior, please use the Feature Request template instead.

        Diagnostics are very helpful for Salus issues. To download them:
        1. Go to **Settings** -> **Devices & Services**.
        2. Find **Salus iT600**.
        3. Open the integration menu.
        4. Click **Download diagnostics**.
        5. Attach the downloaded JSON file to this issue after reviewing it for private data.

  - type: dropdown
    id: issue_type
    attributes:
      label: What kind of issue is this?
      options:
        - Command fails or device cannot be controlled
        - Entity state is wrong or missing
        - Device is unavailable or disappears
        - Setup, authentication, or gateway connection
        - HACS, migration, or duplicate entities
        - Other support request
    validations:
      required: true

  - type: input
    id: home_assistant_version
    attributes:
      label: Home Assistant version
      placeholder: "2026.4.0"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: homeassistant_salus version
      placeholder: "0.7.0"
    validations:
      required: true

  - type: input
    id: gateway_model
    attributes:
      label: Gateway model and firmware
      description: Include UGE600/UG800 and firmware version if visible.
      placeholder: "UG800, firmware 20251118"
    validations:
      required: false

  - type: dropdown
    id: gateway_protocol
    attributes:
      label: Gateway protocol
      description: Leave as Unknown if you do not know. The integration auto-detects this.
      options:
        - Unknown
        - AES-CBC / legacy
        - AES-CCM / newer firmware
    validations:
      required: true

  - type: textarea
    id: affected_devices
    attributes:
      label: Affected devices
      description: List device models, entity IDs, and what is wrong.
      placeholder: |
        Device model: SQ610RF / FC600 / SP600 / unknown
        Entity ID: climate.example / switch.example / sensor.example
        Problem: Describe what is wrong with this device or entity.
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: Expected and actual behavior
      placeholder: |
        Expected: What should happen?
        Actual: What happens instead?
    validations:
      required: true

  - type: textarea
    id: salus_app_behavior
    attributes:
      label: Does the same device/action work in the SALUS app?
      description: If relevant, compare the Home Assistant behavior with the official SALUS app. This helps separate integration issues from device, gateway, or installation issues.
      placeholder: |
        Yes, the same action works in the SALUS app.
        No, the SALUS app also has the same problem.
        I have not tested this.
    validations:
      required: false

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Attach diagnostics or paste relevant redacted snippets. The EUID/token is redacted automatically, but review host/IP and device IDs before posting publicly.
      placeholder: |
        Attach config_entry-salus-*.json or paste the relevant gateway/device sections.
        For state or command problems, diagnostics before and after reproducing the issue are especially useful.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant Home Assistant logs from startup, reload, polling, or the failed command. For best results, enable debug logging from Settings -> Devices & Services -> Salus iT600 -> Enable debug logging, reproduce the issue, then disable debug logging and attach the downloaded log.
      render: text
    validations:
      required: false

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open the affected entity or integration.
        2. Perform the action that triggers the issue.
        3. Describe the result you see.
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I have restarted Home Assistant after installing/updating the integration.
          required: false
        - label: I have checked that the device is online in the SALUS app.
          required: false
        - label: I have attached diagnostics or explained why I cannot provide them.
          required: false
